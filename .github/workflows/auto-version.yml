name: Auto Version Bump

on:
  push:
    branches: [main]
    paths:
      - 'plugins/*/skills/**'
      - 'plugins/*/.claude-plugin/plugin.json'

jobs:
  bump:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[auto-version]')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AUTO_VERSION_TOKEN }}
          fetch-depth: 2

      - name: Bump changed plugins
        id: bump
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: node .github/scripts/bump-versions.js

      - name: Commit
        if: steps.bump.outputs.bumped
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/*/.claude-plugin/plugin.json .claude-plugin/marketplace.json
          git diff --cached --quiet || { git commit -m "${BUMPED} [auto-version]" && git push; }
        env:
          BUMPED: ${{ steps.bump.outputs.bumped }}
